<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} - Storyboard</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                       */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      line-height: 1.6;
      min-height: 100vh;
    }

    a {
      color: #e94560;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    /* ------------------------------------------------------------------ */
    /* Layout shell                                                        */
    /* ------------------------------------------------------------------ */
    .app-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: auto 1fr;
      grid-template-areas:
        "header header"
        "sidebar main";
      min-height: 100vh;
    }

    @media (max-width: 900px) {
      .app-layout {
        grid-template-columns: 1fr;
        grid-template-areas:
          "header"
          "sidebar"
          "main";
      }

      .sidebar {
        max-height: 300px;
        overflow-y: auto;
        border-right: none !important;
        border-bottom: 1px solid #0f3460;
      }
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                              */
    /* ------------------------------------------------------------------ */
    .header {
      grid-area: header;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 20px 32px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 24px;
    }

    .header__title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #e94560;
      flex-shrink: 0;
    }

    .header__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-size: 0.85rem;
      color: #a0a0b8;
    }

    .header__meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header__meta-label {
      color: #7a7a90;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }

    .header__meta-value {
      color: #e0e0e0;
      font-weight: 500;
    }

    /* ------------------------------------------------------------------ */
    /* Sidebar                                                             */
    /* ------------------------------------------------------------------ */
    .sidebar {
      grid-area: sidebar;
      background: #16213e;
      border-right: 1px solid #0f3460;
      padding: 20px 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #0f3460 #16213e;
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: #16213e;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 3px;
    }

    .sidebar__section {
      margin-bottom: 24px;
    }

    .sidebar__heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #7a7a90;
      padding: 0 20px;
      margin-bottom: 8px;
    }

    /* Scene navigation */
    .scene-nav {
      list-style: none;
    }

    .scene-nav__item {
      display: block;
    }

    .scene-nav__link {
      display: block;
      padding: 8px 20px;
      color: #c0c0d0;
      font-size: 0.82rem;
      transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .scene-nav__link:hover {
      background: rgba(15, 52, 96, 0.5);
      color: #e94560;
      text-decoration: none;
      border-left-color: #e94560;
    }

    .scene-nav__number {
      display: inline-block;
      min-width: 24px;
      font-weight: 600;
      color: #e94560;
      margin-right: 6px;
    }

    /* Character gallery */
    .char-gallery {
      padding: 0 20px;
    }

    .char-gallery__character {
      margin-bottom: 16px;
    }

    .char-gallery__name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #e94560;
      margin-bottom: 6px;
    }

    .char-gallery__role {
      font-size: 0.7rem;
      color: #7a7a90;
      margin-bottom: 6px;
    }

    .char-gallery__thumbs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }

    .char-gallery__thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid #0f3460;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }

    .char-gallery__thumb:hover {
      border-color: #e94560;
      transform: scale(1.05);
    }

    /* ------------------------------------------------------------------ */
    /* Main content area                                                   */
    /* ------------------------------------------------------------------ */
    .main {
      grid-area: main;
      padding: 28px 32px;
      overflow-y: auto;
    }

    @media (max-width: 900px) {
      .main {
        padding: 20px 16px;
      }
    }

    /* ------------------------------------------------------------------ */
    /* Scene sections                                                      */
    /* ------------------------------------------------------------------ */
    .scene-section {
      margin-bottom: 48px;
    }

    .scene-header {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 16px 24px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
    }

    .scene-header__number {
      background: #e94560;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 4px 12px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .scene-header__heading {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e0e0e0;
      flex: 1;
      min-width: 200px;
    }

    .scene-header__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .scene-tag {
      font-size: 0.7rem;
      padding: 3px 10px;
      border-radius: 12px;
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
      border: 1px solid rgba(233, 69, 96, 0.3);
      white-space: nowrap;
    }

    .scene-tag--location {
      background: rgba(15, 52, 96, 0.4);
      color: #a0c4ff;
      border-color: rgba(160, 196, 255, 0.3);
    }

    .scene-tag--time {
      background: rgba(255, 183, 77, 0.15);
      color: #ffb74d;
      border-color: rgba(255, 183, 77, 0.3);
    }

    .scene-tag--mood {
      background: rgba(129, 199, 132, 0.15);
      color: #81c784;
      border-color: rgba(129, 199, 132, 0.3);
    }

    /* ------------------------------------------------------------------ */
    /* Panel grid                                                          */
    /* ------------------------------------------------------------------ */
    .panel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    @media (max-width: 600px) {
      .panel-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ------------------------------------------------------------------ */
    /* Panel card                                                          */
    /* ------------------------------------------------------------------ */
    .panel-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .panel-card:hover {
      border-color: #e94560;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.15);
    }

    /* Panel image */
    .panel-card__image-wrap {
      position: relative;
      cursor: pointer;
      overflow: hidden;
    }

    .panel-card__image {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .panel-card__image-wrap:hover .panel-card__image {
      transform: scale(1.03);
    }

    .panel-card__badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(26, 26, 46, 0.85);
      color: #e94560;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }

    .panel-card__enlarge-hint {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(26, 26, 46, 0.75);
      color: #a0a0b8;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.2s;
      backdrop-filter: blur(4px);
    }

    .panel-card__image-wrap:hover .panel-card__enlarge-hint {
      opacity: 1;
    }

    /* Panel body */
    .panel-card__body {
      padding: 14px 16px;
    }

    .panel-card__shot-info {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .shot-tag {
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 3px;
      background: rgba(15, 52, 96, 0.5);
      color: #a0c4ff;
      font-weight: 500;
    }

    .shot-tag--movement {
      background: rgba(233, 69, 96, 0.12);
      color: #e0a0a0;
    }

    /* Dialogue overlay */
    .panel-card__dialogue {
      background: rgba(233, 69, 96, 0.08);
      border-left: 3px solid #e94560;
      padding: 8px 12px;
      margin-bottom: 10px;
      border-radius: 0 4px 4px 0;
    }

    .panel-card__dialogue-char {
      font-size: 0.72rem;
      font-weight: 700;
      color: #e94560;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .panel-card__dialogue-line {
      font-size: 0.8rem;
      color: #d0d0e0;
      font-style: italic;
    }

    /* Notes (expandable) */
    .panel-card__notes {
      margin-top: 8px;
    }

    .panel-card__notes-toggle {
      background: none;
      border: none;
      color: #7a7a90;
      font-size: 0.72rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 0;
      transition: color 0.15s;
    }

    .panel-card__notes-toggle:hover {
      color: #e94560;
    }

    .panel-card__notes-toggle-icon {
      display: inline-block;
      transition: transform 0.2s;
      font-size: 0.6rem;
    }

    .panel-card__notes-toggle[aria-expanded="true"] .panel-card__notes-toggle-icon {
      transform: rotate(90deg);
    }

    .panel-card__notes-content {
      display: none;
      font-size: 0.78rem;
      color: #a0a0b8;
      padding: 6px 0 2px;
      line-height: 1.5;
    }

    .panel-card__notes-content--visible {
      display: block;
    }

    /* Video prompt section */
    .panel-card__video-prompt {
      margin-top: 8px;
      border-top: 1px solid rgba(15, 52, 96, 0.5);
      padding-top: 8px;
    }

    .video-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }

    .video-badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 3px;
      font-weight: 600;
    }

    .video-badge--duration {
      background: rgba(129, 199, 132, 0.2);
      color: #81c784;
      border: 1px solid rgba(129, 199, 132, 0.3);
    }

    .video-badge--camera {
      background: rgba(100, 181, 246, 0.15);
      color: #64b5f6;
      border: 1px solid rgba(100, 181, 246, 0.3);
    }

    .video-badge--transition {
      background: rgba(255, 183, 77, 0.15);
      color: #ffb74d;
      border: 1px solid rgba(255, 183, 77, 0.3);
    }

    .video-prompt-text {
      font-size: 0.76rem;
      color: #b0b0c0;
      background: rgba(15, 52, 96, 0.25);
      padding: 8px 10px;
      border-radius: 4px;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .video-audio {
      font-size: 0.72rem;
      color: #9090a0;
    }

    .video-audio__line {
      margin-bottom: 3px;
    }

    .video-audio__label {
      display: inline-block;
      min-width: 28px;
      font-weight: 700;
      font-size: 0.62rem;
      color: #e94560;
      letter-spacing: 0.04em;
    }

    .modal__meta-divider {
      border-top: 1px solid #0f3460;
      margin: 16px 0;
    }

    /* ------------------------------------------------------------------ */
    /* Transition indicator between panels                                 */
    /* ------------------------------------------------------------------ */
    .transition-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 0;
      color: #7a7a90;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      grid-column: 1 / -1;
    }

    .transition-indicator__arrow {
      width: 40px;
      height: 1px;
      background: #0f3460;
      position: relative;
    }

    .transition-indicator__arrow::after {
      content: "";
      position: absolute;
      right: 0;
      top: -3px;
      border: 3px solid transparent;
      border-left-color: #0f3460;
    }

    /* ------------------------------------------------------------------ */
    /* Image modal                                                         */
    /* ------------------------------------------------------------------ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(10, 10, 20, 0.92);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay--visible {
      display: flex;
    }

    .modal {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      max-width: 1100px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 320px;
      box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
    }

    @media (max-width: 800px) {
      .modal {
        grid-template-columns: 1fr;
        max-width: 600px;
      }
    }

    .modal__image-pane {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 300px;
    }

    .modal__image {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 4px;
    }

    .modal__meta-pane {
      padding: 24px;
      overflow-y: auto;
      border-left: 1px solid #0f3460;
    }

    @media (max-width: 800px) {
      .modal__meta-pane {
        border-left: none;
        border-top: 1px solid #0f3460;
      }
    }

    .modal__close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: rgba(26, 26, 46, 0.8);
      border: 1px solid #0f3460;
      color: #e0e0e0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      z-index: 1001;
    }

    .modal__close:hover {
      background: #e94560;
      border-color: #e94560;
    }

    .modal__meta-title {
      font-size: 1rem;
      font-weight: 700;
      color: #e94560;
      margin-bottom: 16px;
    }

    .modal__meta-group {
      margin-bottom: 14px;
    }

    .modal__meta-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7a7a90;
      margin-bottom: 3px;
    }

    .modal__meta-value {
      font-size: 0.85rem;
      color: #d0d0e0;
    }

    .modal__meta-dialogue {
      background: rgba(233, 69, 96, 0.08);
      border-left: 3px solid #e94560;
      padding: 8px 12px;
      border-radius: 0 4px 4px 0;
    }

    .modal__meta-dialogue-char {
      font-size: 0.72rem;
      font-weight: 700;
      color: #e94560;
      text-transform: uppercase;
    }

    .modal__meta-dialogue-line {
      font-size: 0.82rem;
      color: #d0d0e0;
      font-style: italic;
    }

    .modal__meta-notes {
      font-size: 0.82rem;
      color: #a0a0b8;
      line-height: 1.5;
    }

    .modal__meta-prompt {
      font-size: 0.75rem;
      color: #8a8a9a;
      background: rgba(15, 52, 96, 0.3);
      padding: 8px 10px;
      border-radius: 4px;
      line-height: 1.5;
      word-break: break-word;
    }

    /* ------------------------------------------------------------------ */
    /* Scrollbar styling for main area                                     */
    /* ------------------------------------------------------------------ */
    .main::-webkit-scrollbar {
      width: 8px;
    }

    .main::-webkit-scrollbar-track {
      background: #1a1a2e;
    }

    .main::-webkit-scrollbar-thumb {
      background: #0f3460;
      border-radius: 4px;
    }

    .main::-webkit-scrollbar-thumb:hover {
      background: #e94560;
    }

    /* ------------------------------------------------------------------ */
    /* Utility                                                             */
    /* ------------------------------------------------------------------ */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- ============================================================= -->
    <!-- Header                                                         -->
    <!-- ============================================================= -->
    <header class="header">
      <h1 class="header__title">{{TITLE}}</h1>
      <div class="header__meta">
        <div class="header__meta-item">
          <span class="header__meta-label">Generated</span>
          <span class="header__meta-value">{{GENERATED_AT}}</span>
        </div>
        <div class="header__meta-item">
          <span class="header__meta-label">Characters</span>
          <span class="header__meta-value">{{CHARACTER_COUNT}}</span>
        </div>
        <div class="header__meta-item">
          <span class="header__meta-label">Scenes</span>
          <span class="header__meta-value">{{SCENE_COUNT}}</span>
        </div>
      </div>
    </header>

    <!-- ============================================================= -->
    <!-- Sidebar                                                        -->
    <!-- ============================================================= -->
    <aside class="sidebar" aria-label="Storyboard navigation">
      <nav class="sidebar__section">
        <h2 class="sidebar__heading">Scenes</h2>
        <ul class="scene-nav">
          {{SCENE_NAV}}
        </ul>
      </nav>
      <div class="sidebar__section">
        <h2 class="sidebar__heading">Characters</h2>
        <div class="char-gallery">
          {{CHARACTER_GALLERY}}
        </div>
      </div>
    </aside>

    <!-- ============================================================= -->
    <!-- Main content                                                   -->
    <!-- ============================================================= -->
    <main class="main">
      {{PANELS_CONTENT}}
    </main>
  </div>

  <!-- ================================================================= -->
  <!-- Image modal                                                       -->
  <!-- ================================================================= -->
  <div class="modal-overlay" id="imageModal" role="dialog" aria-modal="true" aria-label="Panel detail view">
    <button class="modal__close" id="modalClose" aria-label="Close modal">&times;</button>
    <div class="modal">
      <div class="modal__image-pane">
        <img class="modal__image" id="modalImage" src="" alt="Enlarged panel" />
      </div>
      <div class="modal__meta-pane" id="modalMeta">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- ================================================================= -->
  <!-- Scripts                                                           -->
  <!-- ================================================================= -->
  <script>
    {{MODAL_SCRIPT}}
  </script>
</body>
</html>
